server {
    listen       8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri /index.html;
    }

    # Optional: proxy /api to the backend (when set via API_BASE at build time)
    # If you set VITE_API_BASE at build time, the client will call the server directly.
}
