steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "--build-arg"
      - "VITE_API_BASE=${_VITE_API_BASE}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/clienthub/client:${_TAG}"
      - "./client"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/clienthub/client:${_TAG}"

substitutions:
  _REGION: me-west1
  _TAG: v1
  _VITE_API_BASE: "https://customerhub-server-357480469333.me-west1.run.app"

options:
  logging: CLOUD_LOGGING_ONLY

