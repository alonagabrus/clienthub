services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskminder
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: taskminder
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE: "http://localhost:8080"
    restart: unless-stopped
    ports:
      - "5173:8080"
    depends_on:
      - server

volumes:
  db_data:
